<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> 채팅방</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>💬 채팅방</h1>

<button id="loginBtn">Google 로그인</button>
<button id="logoutBtn">로그아웃</button>
<div id="userInfo"></div>

<hr>

<input id="roomName" placeholder="채팅방 이름">
<button id="createRoomBtn">채팅방 생성</button>

<div id="rooms"></div>

<hr>

<div id="chatSection" style="display:none;">
  <h2 id="currentRoom"></h2>

  <div id="chatbox"></div>

  <input id="message" placeholder="메시지 입력">
  <button id="sendBtn">전송</button>
</div>

<script type="module" src="script.js"></script>

</body>
</html>
