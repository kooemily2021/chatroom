<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatRoom+</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- ================= HEADER ================= -->

<header>

    <div class="logo">
        💬 ChatRoom+
    </div>

    <div class="search">

        <input
            type="text"
            id="searchUser"
            placeholder="친구 ID 검색">

        <button id="searchBtn">
            검색
        </button>

    </div>

    <div class="header-right">

        <button id="loginBtn">
            Google 로그인
        </button>

        <button id="logoutBtn">
            로그아웃
        </button>

    </div>

</header>

<!-- ================= MAIN ================= -->

<main>

<!-- ========= LEFT ========= -->

<aside class="sidebar">

<div class="profile">

<img
id="profileImage"
src="assets/default-profile.png">

<h2 id="displayName">
로그인하세요
</h2>

<p id="userID">
@---------
</p>

<p id="status">
상태메시지
</p>

<button id="editProfileBtn">
프로필 수정
</button>

</div>

<hr>

<div class="friend-section">

<div class="title">

친구

<button id="addFriendBtn">
+
</button>

</div>

<div id="friendList">

<p class="empty">
친구가 없습니다.
</p>

</div>

</div>

<hr>

<div class="request-section">

<div class="title">

친구 요청

</div>

<div id="requestList">

<p class="empty">
요청이 없습니다.
</p>

</div>

</div>

</aside>

<!-- ========= CENTER ========= -->

<section class="room-section">

<div class="room-header">

<h2>
채팅방
</h2>

<button id="createRoomBtn">

+ 채팅방 생성

</button>

</div>

<div id="roomList">

<p class="empty">

채팅방이 없습니다.

</p>

</div>

</section>

<!-- ========= RIGHT ========= -->

<section class="chat-section">

<div class="chat-header">

<h2 id="roomTitle">

채팅방을 선택하세요

</h2>

<div id="onlineState">

⚫ Offline

</div>

</div>

<div id="chatArea">

<p class="empty">

채팅을 시작해보세요.

</p>

</div>

<div id="typingArea">

</div>

<div class="chat-input">

<input

type="text"

id="messageInput"

placeholder="메시지를 입력하세요...">

<button id="sendBtn">

전송

</button>

</div>

</section>

</main>

<!-- ================= 친구 추가 ================= -->

<div class="modal" id="friendModal">

<div class="modal-content">

<h2>

친구 추가

</h2>

<input

type="text"

id="friendID"

placeholder="@AB123456">

<div class="modal-buttons">

<button id="sendFriendRequest">

요청 보내기

</button>

<button class="closeModal">

취소

</button>

</div>

</div>

</div>

<!-- ================= 프로필 ================= -->

<div class="modal" id="profileModal">

<div class="modal-content">

<h2>

프로필 수정

</h2>

<input

type="text"

id="nicknameInput"

placeholder="닉네임">

<input

type="text"

id="statusInput"

placeholder="상태메시지">

<button id="saveProfile">

저장

</button>

<button class="closeModal">

닫기

</button>

</div>

</div>

<!-- ================= 채팅방 생성 ================= -->

<div class="modal" id="roomModal">

<div class="modal-content">

<h2>

새 채팅방

</h2>

<input

type="text"

id="roomName"

placeholder="채팅방 이름">

<button id="createRoom">

생성

</button>

<button class="closeModal">

취소

</button>

</div>

</div>

<!-- ================= JS ================= -->

<script type="module" src="js/firebase.js"></script>

<script type="module" src="js/auth.js"></script>

<script type="module" src="js/users.js"></script>

<script type="module" src="js/friends.js"></script>

<script type="module" src="js/rooms.js"></script>

<script type="module" src="js/chat.js"></script>

<script type="module" src="js/profile.js"></script>

<script type="module" src="js/app.js"></script>

</body>

</html>
